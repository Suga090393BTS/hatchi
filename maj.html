<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mise à jour Hatchi</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #1f6f5c; color: #fff; display: grid; place-items: center; min-height: 100vh; margin: 0; text-align: center; padding: 24px; }
    .paw { font-size: 52px; margin-bottom: 8px; }
    h1 { margin: 6px 0; font-size: 22px; }
    p { opacity: .9; }
    a { color: #fff; font-weight: 700; }
  </style>
</head>
<body>
  <div>
    <div class="paw">🐾</div>
    <h1>Mise à jour de Hatchi…</h1>
    <p id="s">Nettoyage du cache…</p>
    <p id="fallback" style="display:none">Si rien ne se passe, <a href="./">appuie ici</a>.</p>
  </div>
  <script>
    (async function () {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) { try { await r.unregister(); } catch (e) {} }
        }
        if (window.caches) {
          const keys = await caches.keys();
          for (const k of keys) { try { await caches.delete(k); } catch (e) {} }
        }
      } catch (e) {}
      document.getElementById('s').textContent = 'Chargement de la dernière version…';
      document.getElementById('fallback').style.display = 'block';
      setTimeout(function () { location.replace('./?maj=' + Date.now()); }, 600);
    })();
  </script>
</body>
</html>
