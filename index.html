<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f6f5c" />
  <title>Hatchi — Suivi du chien</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Hatchi" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-paw">🐾</span>
          <div class="brand-text">
            <strong id="dogNameLabel">Hatchi</strong>
            <small id="dateLabel"></small>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="sync-pill" id="vetCallBtn" title="Appeler le vétérinaire">📞</button>
          <button class="sync-pill" id="syncPill" title="État de la synchronisation">
            <span class="dot"></span><span id="syncText">Local</span>
          </button>
        </div>
      </div>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabbar" id="tabbar">
      <button data-route="today"      class="tab"><span class="ic">🏠</span><span>Aujourd'hui</span></button>
      <button data-route="meals"      class="tab"><span class="ic">🍖</span><span>Repas</span></button>
      <button data-route="shopping"   class="tab"><span class="ic">🛒</span><span>Courses</span></button>
      <button data-route="treatments" class="tab"><span class="ic">💊</span><span>Soins</span></button>
      <button data-route="journal"    class="tab"><span class="ic">📓</span><span>Journal</span></button>
      <button data-route="settings"   class="tab"><span class="ic">⚙️</span><span>Réglages</span></button>
    </nav>
  </div>

  <!-- Generic modal host -->
  <div id="modalHost" class="modal-host" hidden></div>
  <div id="toastHost" class="toast-host"></div>

  <!-- Supabase client (loaded lazily only if sync is configured) -->
  <script>window.__SUPABASE_CDN__ = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';</script>

  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/views/today.js"></script>
  <script src="js/views/meals.js"></script>
  <script src="js/views/shopping.js"></script>
  <script src="js/views/health.js"></script>
  <script src="js/views/treatments.js"></script>
  <script src="js/views/journal.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
